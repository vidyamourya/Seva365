<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Seva365</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .contact-hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('hero_image.png') center/cover no-repeat;
      min-height: 40vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .contact-card {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- Navbar (Same as Home Page) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="user_home.html">Seva365</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto text-center text-lg-start">
        <li class="nav-item"><a class="nav-link" href="user_home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="booking.html">Book Service</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        <li class="nav-item ms-lg-3">
          <a class="btn btn-outline-light w-100 w-lg-auto mt-2 mt-lg-0" href="index.html">Log Out</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<section class="contact-hero">
  <div>
    <h1 class="fw-bold">Contact Us</h1>
    <p class="lead">We’re here to help you</p>
  </div>
</section>

<!-- Contact Section -->
<section class="py-5">
  <div class="container">
    <div class="row g-4">

      <!-- Contact Info -->
      <div class="col-md-5">
        <div class="card shadow contact-card p-4 h-100">
          <h4 class="fw-bold mb-3">Get In Touch</h4>
          <p><strong>📞 Phone:</strong> 7004500000</p>
          <p><strong>🌐 Website:</strong> <a href="#">www.Seva365.com</a></p>
          <p><strong>📍 Location:</strong> Mumbai, India</p>
          <p><strong>🕒 Working Hours:</strong> Mon–Sat, 9AM–7PM</p>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="col-md-7">
        <div class="card shadow contact-card p-4">
          <h4 class="fw-bold mb-3">Send Us a Message</h4>

          <form>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="4" placeholder="Write your message..." required></textarea>
            </div>

            <button type="submit" class="btn btn-warning w-100">Submit</button>
          </form>

        </div>
      </div>

    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-dark text-light text-center py-3">
  <p class="mb-0">© 2026 Seva365 | All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="scripts.js"></script>

</body>
</html>
